<!DOCTYPE html>
<html lang="en">

<head>
    <title>Thank You — Vinit Lonare</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .thankyou {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #0a0a0a;
            color: #f0ede6;
        }

        .thankyou h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 60px;
            font-weight: 400;
        }

        .thankyou p {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }

        .thankyou a {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 25px;
            border: 1px solid #c9b99a;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .thankyou a:hover {
            background-color: #c9b99a;
            color: #0a0a0a;
        }
    </style>
</head>

<body>

    <div class="thankyou">
        <h1>Thank You!</h1>

        <p>Your message has been sent successfully.<br>
            I’ll get back to you soon.</p>

        <a href="index.html">Back to Home</a>
    </div>

</body>

</html>
